server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: rotas client-side caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets versionados (Vite gera hashes no nome): cache longo.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
