services:
  postgres:
    image: postgres:16-alpine
    container_name: goodfunds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goodfunds}
      POSTGRES_USER: ${POSTGRES_USER:-goodfunds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goodfunds}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - goodfunds-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goodfunds} -d ${POSTGRES_DB:-goodfunds}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
    image: goodfunds-backend:local
    container_name: goodfunds-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-goodfunds}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-goodfunds}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-goodfunds}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "${APP_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    image: goodfunds-frontend:local
    container_name: goodfunds-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  goodfunds-postgres-data:
    name: goodfunds-postgres-data
