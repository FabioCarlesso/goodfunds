spring:
  application:
    name: goodfunds
  profiles:
    active: dev
  config:
    import: optional:classpath:category-rules.yml
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  uploads:
    dir: ${APP_UPLOADS_DIR:./uploads}
  cors:
    # Origens autorizadas a consumir a API via browser. Lista separada por virgula.
    # Default cobre o dev server do Vite; em producao defina a origem real do frontend.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never # explicit: default is 'never'; kept to prevent accidental exposure on Spring Boot upgrades

jwt:
  secret: ${JWT_SECRET:dev-secret-please-change-in-production}
  expiration: 86400000
