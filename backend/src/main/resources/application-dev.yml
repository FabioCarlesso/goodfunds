spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/goodfunds
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:goodfunds}
    password: ${DB_PASSWORD:goodfunds}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
