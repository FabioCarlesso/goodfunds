spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# Swagger UI / OpenAPI ficam disponiveis em dev; em producao a especificacao e a UI
# sao desativadas para nao expor a superficie da API publicamente.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
